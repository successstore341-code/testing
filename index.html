<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deteksi Tangan Real-Time HP</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #webcam {
            display: none;
        }
        #output_canvas {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Agar pas dengan layar HP */
            transform: scaleX(-1); /* Efek cermin supaya gerakan natural */
        }
        #status-text {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #00ff00;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 5px #000000;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="status-text">Menghubungkan Kamera...</div>
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusText = document.getElementById('status-text');

        // Fungsi menghitung jari terbuka berdasarkan koordinat posisi asli
        function countFingers(landmarks) {
            let fingers = [];
            
            // 1. Jempol (Membaca sumbu X)
            if (landmarks[4].x < landmarks[3].x) {
                fingers.push(1);
            } else {
                fingers.push(0);
            }

            // 2. Empat Jari Lainnya (Membaca sumbu Y)
            const tipIds = [8, 12, 16, 20];
            for (let id of tipIds) {
                if (landmarks[id].y < landmarks[id - 2].y) {
                    fingers.push(1);
                } else {
                    fingers.push(0);
                }
            }
            return fingers.reduce((a, b) => a + b, 0);
        }

        // Fungsi utama pemrosesan kamera
        function onResults(results) {
            // Set resolusi canvas mengikuti resolusi video masuk
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // Gambar tangkapan kamera asli ke canvas
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            let totalFingers = 0;

            // JIKA TANGAN TERDETEKSI OLEH KAMERA
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                totalFingers = countFingers(landmarks);

                // KODE UNTUK MENGGAMBAR TITIK & GARIS TANGAN (Seperti di foto laptop)
                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#ffffff', lineWidth: 3});
                drawLandmarks(canvasCtx, landmarks, {color: '#ff0000', lineWidth: 1, radius: 4});
            }

            // --- LOGIKA KONDISI BLUR ---
            if (totalFingers === 5) {
                // Buat efek blur pada gambar kamera
                canvasCtx.filter = 'blur(25px)';
                canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
                canvasCtx.filter = 'none'; // Matikan filter agar teks tidak ikut blur
                
                // Gambar ulang kerangka tangan di atas efek blur agar tetap terlihat pelacakannya
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    drawConnectors(canvasCtx, results.multiHandLandmarks[0], HAND_CONNECTIONS, {color: '#ffffff', lineWidth: 3});
                    drawLandmarks(canvasCtx, results.multiHandLandmarks[0], {color: '#ff0000', lineWidth: 1, radius: 4});
                }

                statusText.innerText = "KAMERA BLUR";
                statusText.style.color = "#ff0000";
            } else {
                statusText.innerText = `Jari Terbuka: ${totalFingers}`;
                statusText.style.color = "#00ff00";
            }

            canvasCtx.restore();
        }

        // Inisialisasi Detektor Tangan MediaPipe
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults(onResults);

        // Menjalankan Kamera Depan/Belakang HP
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
        
        camera.start()
            .then(() => {
                statusText.innerText = "Kamera Aktif. Angkat Tanganmu!";
            })
            .catch(err => {
                statusText.innerText = "Gagal Akses Kamera.";
                console.error(err);
            });
    </script>
</body>
</html>
