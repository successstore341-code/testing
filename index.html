<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>AI System - Deri Al Dzikri</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        .canvas-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        /* Cyberpunk UI */
        .hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 20px; box-sizing: border-box; pointer-events: none; }
        .alert-box { 
            background: rgba(255, 0, 0, 0.2); border: 2px solid red; color: #ff5555; 
            padding: 20px; text-align: center; font-size: 2em; font-weight: bold;
            text-transform: uppercase; animation: blink 1s infinite; display: none;
        }
        @keyframes blink { 50% { opacity: 0; } }
        
        #btn-start { position: absolute; z-index: 999; padding: 20px 40px; background: #00f2ff; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <button id="btn-start" onclick="init()">AKTIFKAN SISTEM CYBER-AI</button>
    
    <div class="canvas-container">
        <video id="input-video" style="display:none"></video>
        <canvas id="output-canvas"></canvas>
        <div class="hud">
            <div id="alert" class="alert-box">PERINGATAN: TIDAK MEMAKAI BAJU! SILAHKAN PAKAI BAJU!</div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('input-video');
        const canvasElement = document.getElementById('output-canvas');
        const ctx = canvasElement.getContext('2d');
        const alertBox = document.getElementById('alert');
        
        // Logika AI
        async function init() {
            document.getElementById('btn-start').style.display = 'none';
            const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
            pose.setOptions({modelComplexity: 1, minDetectionConfidence: 0.5});
            pose.onResults(onResults);

            const camera = new Camera(videoElement, {
                onFrame: async () => { await pose.send({image: videoElement}); },
                width: 1280, height: 720
            });
            camera.start();
        }

        function onResults(results) {
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            ctx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.poseLandmarks) {
                // DETEKSI BAJU: Kita cek koordinat bahu (11 & 12)
                const shoulderLeft = results.poseLandmarks[11];
                const shoulderRight = results.poseLandmarks[12];
                
                // Jika bahu terlihat sangat jelas/terbuka dan kondisi cahaya kulit terdeteksi
                // Ini logika sederhana: jika posisi tubuh terdeteksi namun tidak ada penutup (bahu terbuka)
                // Kita buat trigger blur total
                
                const isShirtless = true; // Contoh logika: kamu bisa tambahkan deteksi warna kulit di sini

                if (isShirtless) {
                    ctx.filter = 'blur(50px)';
                    ctx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
                    ctx.filter = 'none';
                    alertBox.style.display = 'block';
                    
                    // Suara AI
                    if (!window.speechSynthesis.speaking) {
                        const msg = new SpeechSynthesisUtterance("Peringatan, anda tidak memakai baju. Silahkan memakai baju terlebih dahulu.");
                        msg.lang = 'id-ID';
                        window.speechSynthesis.speak(msg);
                    }
                } else {
                    alertBox.style.display = 'none';
                }
            }
        }
    </script>
</body>
</html>
