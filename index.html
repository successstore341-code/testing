<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem AI Multi-Perintah + Stiker Anime Deri Al Dzikri</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050811;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: #fff;
        }
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #webcam {
            display: none; /* Sembunyikan video asli */
        }
        #output_canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Efek cermin */
        }
        
        /* UI Overlay HUD Cyberpunk */
        .hud-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            border: 4px solid rgba(0, 255, 242, 0.2);
            pointer-events: none;
            z-index: 5;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 25px;
        }
        
        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5, 8, 17, 0.7);
            padding: 15px 20px;
            border-radius: 8px;
            border-left: 5px solid #00fff2;
            backdrop-filter: blur(5px);
        }

        #status-text {
            color: #00fff2;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #finger-count {
            background: rgba(0, 255, 242, 0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 16px;
            color: #00fff2;
            border: 1px solid #00fff2;
        }

        /* Tombol aktivasi suara browser */
        #start-btn {
            position: absolute;
            z-index: 100;
            padding: 15px 30px;
            background: linear-gradient(45deg, #00fff2, #0077ff);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 255, 242, 0.5);
        }
    </style>
</head>
<body>

    <button id="start-btn" onclick="aktifkanSistem()">AKTIFKAN AI SYSTEM</button>

    <div class="container">
        <div class="hud-overlay">
            <div class="hud-header">
                <div id="status-text">SISTEM SIAP DIJALANKAN...</div>
                <div id="finger-count">Jari: 0</div>
            </div>
        </div>
        
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusText = document.getElementById('status-text');
        const fingerCountText = document.getElementById('finger-count');
        const startBtn = document.getElementById('start-btn');

        let sistemSuaraSiap = false;
        let sedangBicara = false;
        let jariSebelumnya = -1;

        // --- BARU: ASET STIKER ANIME ---
        // GANTI URL DI BAWAH INI DENGAN URL STIKER ANIME-MU SENDIRI (Gunakan PNG Transparan)
        const animeSticker = new Image();
        animeSticker.src = 'https://www.image2url.com/r2/default/images/1782318131343-96c28c3e-39dd-41ac-a078-eeb48ec5698b.jpg'; // Contoh URL Stiker Anime

        // Inisialisasi MediaPipe Face Mesh
        const faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true, // Meningkatkan akurasi area mata dan bibir
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        // Inisialisasi MediaPipe Hands
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        // Fungsi Suara AI Text-to-Speech
        function aiBicara(teks) {
            if ('speechSynthesis' in window && sistemSuaraSiap && !sedangBicara) {
                sedangBicara = true;
                const ucapan = new SpeechSynthesisUtterance(teks);
                ucapan.lang = 'id-ID'; 
                ucapan.pitch = 1.0;    
                ucapan.rate = 1.0;     

                ucapan.onend = function() {
                    setTimeout(() => {
                        sedangBicara = false;
                    }, 1500);
                };

                window.speechSynthesis.speak(ucapan);
            }
        }

        function aktifkanSistem() {
            sistemSuaraSiap = true;
            startBtn.style.display = 'none';
            aiBicara("Sistem AI aktif. Memulai deteksi wajah dan tangan.");
            mulaiKamera();
        }

        // Fungsi hitung jari terbuka
        function countFingers(landmarks) {
            let fingers = [];
            if (landmarks[4].x < landmarks[3].x) fingers.push(1);
            else fingers.push(0);

            const tipIds = [8, 12, 16, 20];
            for (let id of tipIds) {
                if (landmarks[id].y < landmarks[id - 2].y) fingers.push(1);
                else fingers.push(0);
            }
            return fingers.reduce((a, b) => a + b, 0);
        }

        // --- BARU: FUNGSI UNTUK MENEMPELKAN STIKER ANIME KE WAJAH ---
        function tempelStiker(landmarks, image, canvasCtx) {
            const canvasWidth = canvasElement.width;
            const canvasHeight = canvasElement.height;

            // Titik-titik kunci wajah (berdasarkan indeks 468 titik Face Mesh)
            const hidung = landmarks[1]; // Ujung hidung
            const mataKiri = landmarks[33]; // Sudut luar mata kiri
            const mataKanan = landmarks[263]; // Sudut luar mata kanan
            const dahi = landmarks[10]; // Tengah dahi
            const dagu = landmarks[152]; // Tengah dagu

            // 1. Hitung Posisi Pusat Stiker (menggunakan ujung hidung)
            const centerX = hidung.x * canvasWidth;
            const centerY = hidung.y * canvasHeight;

            // 2. Hitung Skala/Ukuran Stiker (berdasarkan lebar wajah dari mata ke mata)
            const lebarWajah = Math.sqrt(
                Math.pow((mataKanan.x - mataKiri.x) * canvasWidth, 2) +
                Math.pow((mataKanan.y - mataKiri.y) * canvasHeight, 2)
            );
            // Sesuaikan faktor pengali (2.5) di bawah untuk membesarkan/mengecilkan stiker
            const stickerWidth = lebarWajah * 2.5; 
            // Pertahankan rasio aspek gambar stiker asli
            const stickerHeight = stickerWidth * (image.height / image.width);

            // 3. Hitung Rotasi Stiker (berdasarkan kemiringan mata)
            const deltaY = (mataKanan.y - mataKiri.y) * canvasHeight;
            const deltaX = (mataKanan.x - mataKiri.x) * canvasWidth;
            const angleRad = Math.atan2(deltaY, deltaX);

            // 4. Transformasi dan Gambar Stiker di Kanvas
            canvasCtx.save(); // Simpan status kanvas saat ini

            // Pindahkan titik pusat koordinat kanvas ke hidung
            canvasCtx.translate(centerX, centerY);
            // Putar kanvas sesuai kemiringan wajah
            canvasCtx.rotate(angleRad);

            // Gambar stiker (diposisikan agar tengah gambar berada di koordinat translate)
            canvasCtx.drawImage(
                image, 
                -stickerWidth / 2, // Geser ke kiri setengah lebar
                -stickerHeight * 0.45, // Geser ke atas (sesuaikan faktor 0.45 agar pas dengan wajah)
                stickerWidth, 
                stickerHeight
            );

            canvasCtx.restore(); // Kembalikan status kanvas
        }

        // --- BARU: FUNGSI CALLBACK GABUNGAN (WAJAH + TANGAN) ---
        async function onResults(resultsHand, resultsFace) {
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // Gambar video asli sebagai *background*
            canvasCtx.drawImage(resultsHand.image, 0, 0, canvasElement.width, canvasElement.height);

            // --- BAGIAN 1: PEMROSESAN WAJAH (STIKER ANIME) ---
            if (resultsFace.multiFaceLandmarks && resultsFace.multiFaceLandmarks.length > 0) {
                const landmarksFace = resultsFace.multiFaceLandmarks[0];
                
                // Tempelkan stiker anime ke wajah
                if (animeSticker.complete) { // Pastikan gambar stiker sudah dimuat
                    tempelStiker(landmarksFace, animeSticker, canvasCtx);
                }
                
                // (Opsional) Uncomment di bawah untuk melihat titik-titik deteksi wajah
                // drawConnectors(canvasCtx, landmarksFace, FACEMESH_TESSELATION, {color: '#C0C0C070', lineWidth: 1});
            }

            // --- BAGIAN 2: PEMROSESAN TANGAN (LOGIKA PERINTAH SUARA) ---
            let totalFingers = 0;

            if (resultsHand.multiHandLandmarks && resultsHand.multiHandLandmarks.length > 0) {
                const landmarksHand = resultsHand.multiHandLandmarks[0];
                totalFingers = countFingers(landmarksHand);

                // Menggambar tulang neon tangan (tetap dipertahankan agar keren)
                drawConnectors(canvasCtx, landmarksHand, HAND_CONNECTIONS, {color: '#00fff2', lineWidth: 3});
                drawLandmarks(canvasCtx, landmarksHand, {color: '#ff0055', lineWidth: 1, radius: 4});
            }

            // Logika multi-perintah (tetap sama seperti sebelumnya)
            if (totalFingers !== jariSebelumnya && totalFingers > 0 && !sedangBicara) {
                if (totalFingers === 3) {
                    aiBicara("Hallo");
                } 
                else if (totalFingers === 2) {
                    aiBicara("Perkenalkan");
                } 
                else if (totalFingers === 1) {
                    aiBicara("Nama saya Deri Al Dzikri");
                } 
                else if (totalFingers === 5) {
                    aiBicara("Salam kenal semuanya");
                }
                jariSebelumnya = totalFingers;
            }

            if (totalFingers === 0) {
                jariSebelumnya = -1;
            }

            // Efek khusus blur untuk 5 jari (tetap dipertahankan)
            if (totalFingers === 5) {
                // Efek blur sekarang juga akan memblur stiker anime karena digambar sebelumnya
                canvasCtx.filter = 'blur(25px)';
                canvasCtx.drawImage(canvasElement, 0, 0); // Blur isi kanvas itu sendiri
                canvasCtx.filter = 'none';
                
                statusText.innerText = "KAMERA BLUR & SALAM";
                statusText.style.color = "#ff0055";
            } else {
                statusText.innerText = "MEMINDAI GERAKAN & WAJAH...";
                statusText.style.color = "#00fff2";
            }

            fingerCountText.innerText = `Jari Terbuka: ${totalFingers}`;
            canvasCtx.restore();
        }

        // Fungsi baru untuk menjalankan kamera dan mengirim data ke kedua model sekaligus
        function mulaiKamera() {
            const camera = new Camera(videoElement, {
                onFrame: async () => {
                    // Kirim frame kamera ke model Hands dan Face Mesh secara paralel
                    const handsPromise = hands.send({image: videoElement});
                    const faceMeshPromise = faceMesh.send({image: videoElement});
                    
                    // Tunggu kedua hasil deteksi selesai
                    const [resultsHand, resultsFace] = await Promise.all([handsPromise, faceMeshPromise]);
                    
                    // Proses hasil gabungan
                    onResults(resultsHand, resultsFace);
                },
                width: 1280, // Resolusi HD
                height: 720
            });
            camera.start();
        }

        // Set callback palsu agar library tidak *error* saat inisialisasi awal (tidak digunakan)
        hands.onResults(() => {});
        faceMesh.onResults(() => {});

    </script>
</body>
</html>
