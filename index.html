<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deri AI System Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        #output_canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #start-btn { position: absolute; z-index: 10; padding: 20px 40px; background: #fff; border-radius: 50px; font-weight: bold; cursor: pointer; border: none; font-size: 18px; }
    </style>
</head>
<body>

    <button id="start-btn" onclick="startAll()">TAP UNTUK MULAI SISTEM</button>
    <audio id="bg-music" loop>
        <source src="https://www.image2url.com/r2/default/audio/1782350820752-9296d1c7-9a90-420b-9576-b4245be8dca2.mp3" type="audio/mpeg">
    </audio>

    <video id="webcam" style="display:none" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output_canvas');
        const ctx = canvas.getContext('2d');
        const music = document.getElementById('bg-music');
        const animeSticker = new Image();
        animeSticker.src = 'https://i.ibb.co.com/Jjp4yvdj/1000380513.png';

        let isBlur = true;
        let sedangBicara = false;

        function aiBicara(teks) {
            if ('speechSynthesis' in window && !sedangBicara) {
                sedangBicara = true;
                const ucapan = new SpeechSynthesisUtterance(teks);
                ucapan.lang = 'id-ID';
                ucapan.onend = () => setTimeout(() => sedangBicara = false, 2000);
                window.speechSynthesis.speak(ucapan);
            }
        }

        async function startAll() {
            document.getElementById('start-btn').style.display = 'none';
            music.play().catch(e => console.log("Musik butuh interaksi"));
            aiBicara("Halo, perkenalkan nama saya Deri Al Dzikri");
            
            const [pose, faceMesh, hands] = [
                new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`}),
                new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`}),
                new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`})
            ];

            faceMesh.setOptions({maxNumFaces: 1});
            hands.setOptions({maxNumHands: 1});
            pose.setOptions({modelComplexity: 1, minDetectionConfidence: 0.5});

            faceMesh.onResults(results => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                // 1. Gambar latar belakang (Video) dan terapkan BLUR jika perlu
                if (isBlur) ctx.filter = 'blur(30px)';
                else ctx.filter = 'none';
                ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
                
                // 2. RESET FILTER sebelum menggambar stiker agar stiker TETAP JERNIH
                ctx.filter = 'none';
                
                // 3. Tempel stiker
                if (results.multiFaceLandmarks[0]) {
                    const l = results.multiFaceLandmarks[0];
                    const size = Math.abs(l[33].x - l[263].x) * canvas.width * 2.2;
                    ctx.drawImage(animeSticker, l[1].x * canvas.width - size/2, l[1].y * canvas.height - size/1.8, size, size);
                }
            });

            pose.onResults(results => {
                // Deteksi bahu (11 & 12). Kalau bahu tidak terdeteksi, isBlur = true
                isBlur = !results.poseLandmarks || (results.poseLandmarks[11].visibility < 0.3);
            });

            hands.onResults(results => {
                if (results.multiHandLandmarks[0] && !sedangBicara) {
                    aiBicara("Nama saya Deri Al Dzikri");
                }
            });

            const camera = new Camera(video, {
                onFrame: async () => {
                    await faceMesh.send({image: video});
                    await pose.send({image: video});
                    await hands.send({image: video});
                },
                width: 1280, height: 720
            });
            camera.start();
        }
    </script>
</body>
</html>
