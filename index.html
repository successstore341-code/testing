<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>DERI-AI ULTIMATE SYSTEM</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; color: #00f2ff; }
        .container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        /* Scanner Laser */
        .laser { position: absolute; width: 100%; height: 2px; background: #00f2ff; box-shadow: 0 0 15px #00f2ff; animation: scan 3s infinite alternate; z-index: 10; }
        @keyframes scan { 0% { top: 10%; } 100% { top: 90%; } }

        /* Cyber HUD */
        .hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 30px; box-sizing: border-box; pointer-events: none; z-index: 20; }
        .box { border: 2px solid #00f2ff; padding: 15px; background: rgba(0,0,0,0.5); display: inline-block; }
        #alert { color: #ff0055; font-size: 2em; text-align: center; margin-top: 20%; display: none; }
        
        #start-btn { position: absolute; z-index: 1000; padding: 25px 50px; background: #00f2ff; color: #000; border: none; font-size: 20px; font-weight: bold; cursor: pointer; border-radius: 50px; box-shadow: 0 0 30px #00f2ff; }
    </style>
</head>
<body>

    <button id="start-btn" onclick="init()">INITIALIZE DERI-AI</button>
    
    <div class="container">
        <div class="laser"></div>
        <video id="video" style="display:none"></video>
        <canvas id="canvas"></canvas>
        <div class="hud">
            <div class="box">SYSTEM: DERI AL DZIKRI<br>STATUS: <span id="status">STANDBY</span></div>
            <div id="alert">!!! PERINGATAN: PAKAI BAJU !!!</div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const alertBox = document.getElementById('alert');
        let jariSebelumnya = -1;

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'id-ID';
            window.speechSynthesis.speak(msg);
        }

        async function init() {
            document.getElementById('start-btn').style.display = 'none';
            const jam = new Date().getHours();
            speak("Halo Deri Al Dzikri. Sekarang jam " + jam + ". Sistem siap beroperasi.");

            const pose = new Pose({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`});
            pose.onResults(onResults);
            const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
            hands.onResults(onResultsHands);

            const camera = new Camera(video, {
                onFrame: async () => { await pose.send({image: video}); await hands.send({image: video}); },
                width: 1280, height: 720
            });
            camera.start();
        }

        function onResults(results) {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
            
            // Logic Deteksi Baju (Ganti isShirtless ke true jika ingin tes efeknya)
            let isShirtless = false; 
            if (isShirtless) {
                ctx.filter = 'blur(60px)';
                ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
                ctx.filter = 'none';
                alertBox.style.display = 'block';
                document.getElementById('status').innerText = "BAJU TIDAK TERDETEKSI";
            } else {
                alertBox.style.display = 'none';
                document.getElementById('status').innerText = "ONLINE";
            }
        }

        function onResultsHands(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const l = results.multiHandLandmarks[0];
                let count = 0;
                if (l[4].x < l[3].x) count++;
                for (let i of [8, 12, 16, 20]) if (l[i].y < l[i-2].y) count++;
                
                if (count !== jariSebelumnya) {
                    if (count == 3) speak("Hallo");
                    if (count == 2) speak("Perkenalkan nama saya Deri Al Dzikri");
                    if (count == 5) speak("Salam kenal semuanya");
                    jariSebelumnya = count;
                }
            }
        }
    </script>
</body>
</html>
