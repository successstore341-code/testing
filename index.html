<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem AI Multi-Perintah + Stiker Kucing Deri Al Dzikri</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050811;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: #fff;
        }
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #webcam {
            display: none;
        }
        #output_canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Efek cermin */
        }
        
        /* UI Overlay HUD Cyberpunk */
        .hud-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            border: 4px solid rgba(0, 255, 242, 0.2);
            pointer-events: none;
            z-index: 5;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 25px;
        }
        
        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5, 8, 17, 0.7);
            padding: 15px 20px;
            border-radius: 8px;
            border-left: 5px solid #00fff2;
            backdrop-filter: blur(5px);
        }

        #status-text {
            color: #00fff2;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #finger-count {
            background: rgba(0, 255, 242, 0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 16px;
            color: #00fff2;
            border: 1px solid #00fff2;
        }

        /* Tombol aktivasi suara browser */
        #start-btn {
            position: absolute;
            z-index: 100;
            padding: 15px 30px;
            background: linear-gradient(45deg, #00fff2, #0077ff);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 255, 242, 0.5);
        }
    </style>
</head>
<body>

    <button id="start-btn" onclick="aktifkanSistem()">AKTIFKAN AI SYSTEM</button>

    <div class="container">
        <div class="hud-overlay">
            <div class="hud-header">
                <div id="status-text">SISTEM SIAP DIJALANKAN...</div>
                <div id="finger-count">Jari: 0</div>
            </div>
        </div>
        
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusText = document.getElementById('status-text');
        const fingerCountText = document.getElementById('finger-count');
        const startBtn = document.getElementById('start-btn');

        let sistemSuaraSiap = false;
        let sedangBicara = false;
        let jariSebelumnya = -1;

        // Variabel penampung data koordinat global
        let dataWajahTerakhir = null;
        let dataTanganTerakhir = null;
        let gambarKameraTerakhir = null;

        // Load stiker kucing PNG Transparan milik Deri
        const animeSticker = new Image();
        animeSticker.src = 'https://i.ibb.co.com/Jjp4yvdj/1000380513.png'; 

        // Inisialisasi MediaPipe Face Mesh
        const faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });
        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        // Inisialisasi MediaPipe Hands
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        // TANGKAP HASIL DETEKSI WAJAH
        faceMesh.onResults((results) => {
            dataWajahTerakhir = results.multiFaceLandmarks ? results.multiFaceLandmarks[0] : null;
            gambarKameraTerakhir = results.image;
            prosesDanRender();
        });

        // TANGKAP HASIL DETEKSI TANGAN
        hands.onResults((results) => {
            dataTanganTerakhir = results.multiHandLandmarks ? results.multiHandLandmarks[0] : null;
        });

        // Fungsi Suara AI Text-to-Speech
        function aiBicara(teks) {
            if ('speechSynthesis' in window && sistemSuaraSiap && !sedangBicara) {
                sedangBicara = true;
                const ucapan = new SpeechSynthesisUtterance(teks);
                ucapan.lang = 'id-ID'; 
                ucapan.pitch = 1.0;    
                ucapan.rate = 1.0;     

                ucapan.onend = function() {
                    setTimeout(() => {
                        sedangBicara = false;
                    }, 1500);
                };
                window.speechSynthesis.speak(ucapan);
            }
        }

        function aktifkanSistem() {
            sistemSuaraSiap = true;
            startBtn.style.display = 'none';
            aiBicara("Sistem AI aktif.");
            mulaiKamera();
        }

        // Hitung jari terbuka
        function countFingers(landmarks) {
            let fingers = [];
            if (landmarks[4].x < landmarks[3].x) fingers.push(1);
            else fingers.push(0);

            const tipIds = [8, 12, 16, 20];
            for (let id of tipIds) {
                if (landmarks[id].y < landmarks[id - 2].y) fingers.push(1);
                else fingers.push(0);
            }
            return fingers.reduce((a, b) => a + b, 0);
        }

        // Menempelkan stiker di koordinat wajah
        function tempelStiker(landmarks, image, canvasCtx) {
            const canvasWidth = canvasElement.width;
            const canvasHeight = canvasElement.height;

            const hidung = landmarks[1]; 
            const mataKiri = landmarks[33]; 
            const mataKanan = landmarks[263]; 

            const centerX = hidung.x * canvasWidth;
            const centerY = hidung.y * canvasHeight;

            const lebarWajah = Math.sqrt(
                Math.pow((mataKanan.x - mataKiri.x) * canvasWidth, 2) +
                Math.pow((mataKanan.y - mataKiri.y) * canvasHeight, 2)
            );
            
            const stickerWidth = lebarWajah * 2.7; // Ukuran lebar topeng stiker
            const stickerHeight = stickerWidth * (image.height / image.width);

            const deltaY = (mataKanan.y - mataKiri.y) * canvasHeight;
            const deltaX = (mataKanan.x - mataKiri.x) * canvasWidth;
            const angleRad = Math.atan2(deltaY, deltaX);

            canvasCtx.save();
            canvasCtx.translate(centerX, centerY);
            canvasCtx.rotate(angleRad);
            // Nilai -0.45 digeser ke atas sedikit agar pas di area dahi/mata wajah asli
            canvasCtx.drawImage(image, -stickerWidth / 2, -stickerHeight * 0.45, stickerWidth, stickerHeight);
            canvasCtx.restore();
        }

        // UTAMA: Render Gambar Kamera + Stiker + Neon Tangan
        function prosesDanRender() {
            if (!gambarKameraTerakhir) return;

            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // 1. Gambar Kamera Asli ke Background
            canvasCtx.drawImage(gambarKameraTerakhir, 0, 0, canvasElement.width, canvasElement.height);

            // 2. Tempel Stiker Kucing jika wajah terdeteksi
            if (dataWajahTerakhir && animeSticker.complete) {
                tempelStiker(dataWajahTerakhir, animeSticker, canvasCtx);
            }

            // 3. Proses Logika & Gambar Tangan
            let totalFingers = 0;

            if (dataTanganTerakhir) {
                totalFingers = countFingers(dataTanganTerakhir);

                // Gambar skeleton neon tangan
                drawConnectors(canvasCtx, dataTanganTerakhir, HAND_CONNECTIONS, {color: '#00fff2', lineWidth: 3});
                drawLandmarks(canvasCtx, dataTanganTerakhir, {color: '#ff0055', lineWidth: 1, radius: 4});
            }

            // Logika Perintah Suara Sesuai Request Deri
            if (totalFingers !== jariSebelumnya && totalFingers > 0 && !sedangBicara) {
                if (totalFingers === 3) aiBicara("Hallo");
                else if (totalFingers === 2) aiBicara("Perkenalkan");
                else if (totalFingers === 1) aiBicara("Nama saya Deri Al Dzikri");
                else if (totalFingers === 5) aiBicara("Salam kenal semuanya");
                
                jariSebelumnya = totalFingers;
            }

            if (totalFingers === 0) {
                jariSebelumnya = -1;
            }

            // Efek blur jika 5 jari terbuka
            if (totalFingers === 5) {
                canvasCtx.filter = 'blur(25px)';
                canvasCtx.drawImage(canvasElement, 0, 0);
                canvasCtx.filter = 'none';
                statusText.innerText = "KAMERA BLUR & SALAM";
                statusText.style.color = "#ff0055";
            } else {
                statusText.innerText = "MEMINDAI GERAKAN & WAJAH...";
                statusText.style.color = "#00fff2";
            }

            fingerCountText.innerText = `Jari Terbuka: ${totalFingers}`;
            canvasCtx.restore();
        }

        // Loop Kamera utama
        function mulaiKamera() {
            const camera = new Camera(videoElement, {
                onFrame: async () => {
                    await faceMesh.send({image: videoElement});
                    await hands.send({image: videoElement});
                },
                width: 1280,
                height: 720
            });
            camera.start();
        }
    </script>
</body>
</html>
